# SECURITY: do NOT whitelist javax.el.Expression as a base class -- that would allow every
# Expression subclass (including attacker-chosen ones) to deserialize. Instead, list concrete
# MethodExpression/ValueExpression implementations for each supported EL engine. See CVE-2018-14667
# and MediaOutputResource#verifyContentProducer for the corresponding request-time check.
whitelist = com.sun.el.lang.VariableMapperImpl,com.sun.el.MethodExpressionImpl,com.sun.el.ValueExpressionImpl,\
            com.sun.el.MethodExpressionLiteral,com.sun.el.ValueExpressionLiteral,\
            javax.faces.application.Resource,\
            javax.faces.component.StateHolderSaver,javax.faces.view.Location,\
            org.apache.el.lang.VariableMapperImpl,org.apache.el.MethodExpressionImpl,\
            org.apache.el.ValueExpressionImpl,org.apache.el.MethodExpressionLiteral,\
            org.apache.el.ValueExpressionLiteral,\
            org.jboss.el.lang.VariableMapperImpl,org.jboss.el.MethodExpressionImpl,\
            org.jboss.el.ValueExpressionImpl,\
            org.jboss.weld.bean.proxy.util.SerializableClientProxy,\
            org.jboss.weld.bean.StringBeanIdentifier,org.richfaces.resource.SerializableResource